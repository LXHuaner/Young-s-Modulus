<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光杠杆法杨氏模量</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.35);
            padding: 36px;
            max-width: 900px;
            width: 100%;
        }
        h1 {
            text-align: center; margin-bottom: 24px;
            background: linear-gradient(135deg, #2b5876, #4e4376);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 32px;
        }
        .method-row {
            display: flex; justify-content: center; gap: 12px; margin-bottom: 24px;
        }
        .method-btn {
            background: #e2e8f0; border: none; padding: 10px 24px;
            border-radius: 12px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: 0.2s;
            color: #4a5568;
        }
        .method-btn.active {
            background: linear-gradient(135deg, #2b5876, #4e4376);
            color: white;
        }
        .section {
            background: #f8fafc; border-radius: 20px; padding: 20px;
            margin-bottom: 20px; border: 1px solid #e2e8f0;
        }
        .section h3 { color: #2d3748; margin-bottom: 14px; font-size: 18px; }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-weight: 600; color: #4a5568; margin-bottom: 4px; font-size: 14px; }
        .input-group input {
            padding: 10px 12px; border: 2px solid #cbd5e0; border-radius: 12px;
            font-size: 15px; transition: 0.2s; background: white;
        }
        .input-group input:focus { border-color: #667eea; outline: none; }
        textarea {
            width: 100%; height: 120px; padding: 12px; border: 2px solid #cbd5e0;
            border-radius: 12px; font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 14px; resize: vertical; background: white; transition: 0.2s;
        }
        textarea:focus { border-color: #667eea; outline: none; }
        .hint { font-size: 12px; color: #718096; margin-top: 4px; }
        .btn {
            background: linear-gradient(135deg, #2b5876, #4e4376);
            color: white; border: none; padding: 16px; border-radius: 16px;
            font-size: 18px; font-weight: 700; cursor: pointer; width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.3); }
        .btn:active { transform: translateY(0); }
        .results {
            margin-top: 24px; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px;
        }
        .result-card {
            background: #f1f5f9; border-radius: 16px; padding: 20px;
            text-align: center; border: 1px solid #e2e8f0;
        }
        .result-card .value { font-size: 26px; font-weight: 700; color: #1e293b; word-break: break-word; }
        .result-card .label { font-size: 14px; color: #64748b; margin-top: 6px; }
        .details {
            margin-top: 20px; background: #f1f5f9; border-radius: 16px;
            padding: 20px; border: 1px solid #e2e8f0;
        }
        .details h4 { margin-bottom: 12px; color: #2d3748; }
        .details table { width: 100%; border-collapse: collapse; }
        .details td { padding: 8px 12px; border-bottom: 1px solid #e2e8f0; }
        .details td:first-child { font-weight: 600; color: #4a5568; }
        .error { color: #b91c1c; background: #fee2e2; padding: 12px; border-radius: 12px; margin-top: 12px; }
        .chart-container {
            margin-top: 20px; text-align: center;
        }
        canvas {
            max-width: 100%; height: auto; border-radius: 12px;
            background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        @media (max-width: 600px) {
            .grid2 { grid-template-columns: 1fr; }
            .card { padding: 20px; }
            .results { grid-template-columns: 1fr; }
            h1 { font-size: 24px; }
            .section { padding: 14px; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🔬 光杠杆法杨氏模量 E</h1>

    <div class="method-row">
        <button class="method-btn active" id="btnChac" onclick="switchMethod('chac')">逐差法</button>
        <button class="method-btn" id="btnLS" onclick="switchMethod('ls')">最小二乘法</button>
    </div>

    <div class="section">
        <h3>📌 基本物理参数</h3>
        <div class="grid2">
            <div class="input-group">
                <label>重力加速度 g (m/s²)</label>
                <input type="number" id="g" value="9.80" step="0.01">
            </div>
            <div class="input-group">
                <label>单个砝码质量 m (g)</label>
                <input type="number" id="mass" value="500" step="1">
            </div>
        </div>
    </div>

    <div class="section">
        <h3>📏 长度测量值（单位：mm）</h3>
        <div class="grid2">
            <div class="input-group">
                <label>金属丝长度 L</label>
                <input type="number" id="L" step="0.1" placeholder="例如 800.0">
            </div>
            <div class="input-group">
                <label>镜尺距离 D</label>
                <input type="number" id="D" step="0.1" placeholder="例如 1200.0">
            </div>
            <div class="input-group">
                <label>金属丝直径 d</label>
                <input type="number" id="d" step="0.001" placeholder="例如 0.500">
            </div>
            <div class="input-group">
                <label>光杠杆常数 b</label>
                <input type="number" id="b" step="0.1" placeholder="例如 70.0">
            </div>
        </div>
    </div>

    <div class="section">
        <h3>📋 标尺读数序列（mm）</h3>
        <textarea id="xData" placeholder="示例：12.5 18.3 24.1 29.8 35.6 41.3 47.0 52.7"></textarea>
        <div class="hint">用空格分隔数据（偶数个）</div>
    </div>

    <button class="btn" onclick="compute()">⚡ 计算杨氏模量及不确定度</button>

    <div id="resultArea" style="display: none;">
        <div class="results" id="cards"></div>
        <div class="details" id="detailsBlock"></div>
        <div id="errorMsg" class="error" style="display: none;"></div>
        <div class="chart-container" id="chartContainer" style="display: none;">
            <canvas id="fitChart"></canvas>
        </div>
    </div>
</div>

<script>
    // ========== 内置仪器允差（单位 mm） ==========
    const INSTRUMENT_TOLERANCES = {
        ruler: 0.5,        // 卷尺允差，用于 L, D, b
        micrometer: 0.004, // 螺旋测微计允差，用于 d
        scale: 0.2         // 望远镜标尺单次读数允差（可按实际修改）
    };

    let currentMethod = 'chac'; // 默认逐差法

    function switchMethod(method) {
        currentMethod = method;
        document.getElementById('btnChac').classList.toggle('active', method === 'chac');
        document.getElementById('btnLS').classList.toggle('active', method === 'ls');
        // 如果有结果则重新计算
        if (document.getElementById('resultArea').style.display !== 'none') {
            compute();
        }
    }

    // 科学计数法格式化（Unicode 上标）
    function formatExponential(value, decimalDigits) {
        if (value === 0) return "0";
        const expStr = value.toExponential(decimalDigits);
        const parts = expStr.split('e');
        const mantissa = parseFloat(parts[0]).toString();
        const exponent = parseInt(parts[1], 10);
        const superDigits = {
            '0': '⁰', '1': '¹', '2': '²', '3': '³', '4': '⁴',
            '5': '⁵', '6': '⁶', '7': '⁷', '8': '⁸', '9': '⁹', '-': '⁻'
        };
        let superExp = '';
        const expAbsStr = Math.abs(exponent).toString();
        if (exponent < 0) superExp += '⁻';
        for (let ch of expAbsStr) {
            superExp += superDigits[ch];
        }
        if (exponent === 0) return mantissa;
        return mantissa + '×10' + superExp;
    }

    // 逐差法计算 Δx 及不确定度（返回对象）
    function computeChac(numbers) {
        const n = numbers.length;
        const k = n / 2;
        const deltas = [];
        for (let i = 0; i < k; i++) {
            deltas.push(numbers[i + k] - numbers[i]);
        }
        const deltaAvg = deltas.reduce((a,b) => a + b, 0) / k;
        const Deltax = deltaAvg / k;
        const deltaStd = k > 1 ? Math.sqrt(deltas.reduce((sum, val) => sum + (val - deltaAvg)**2, 0) / (k - 1)) : 0;
        const uA_delta_avg = deltaStd / Math.sqrt(k);
        const uA_Deltax = uA_delta_avg / k;
        const u_ins = INSTRUMENT_TOLERANCES.scale / Math.sqrt(3);
        const uB_Deltax = Math.sqrt(2 / (k * k * k)) * u_ins;
        const u_Deltax = Math.sqrt(uA_Deltax**2 + uB_Deltax**2);
        return {
            Deltax,
            uA_Deltax,
            uB_Deltax,
            u_Deltax,
            deltas,
            deltaAvg,
            deltaStd,
            n,
            k
        };
    }

    // 最小二乘法计算 Δx 及不确定度，返回对象
    function computeLS(numbers) {
        const N = numbers.length;
        const x = Array.from({length: N}, (_, i) => i + 1); // 砝码序号 1..N
        const y = numbers;
        const xMean = (N + 1) / 2;
        const yMean = y.reduce((a,b) => a + b, 0) / N;

        let Sxx = 0, Sxy = 0;
        for (let i = 0; i < N; i++) {
            const dx = x[i] - xMean;
            Sxx += dx * dx;
            Sxy += dx * (y[i] - yMean);
        }
        const slope = Sxy / Sxx;        // Δx
        const intercept = yMean - slope * xMean;

        // 残差标准差
        let sumSqRes = 0;
        for (let i = 0; i < N; i++) {
            const yPred = slope * x[i] + intercept;
            sumSqRes += (y[i] - yPred) ** 2;
        }
        const sy = N > 2 ? Math.sqrt(sumSqRes / (N - 2)) : 0;

        // 相关系数
        let Sxx_y = 0, Syy = 0;
        for (let i = 0; i < N; i++) {
            Syy += (y[i] - yMean) ** 2;
        }
        const r = Sxy / Math.sqrt(Sxx * Syy);
        const r2 = r * r;

        // A类：斜率的标准不确定度
        const uA_slope = sy / Math.sqrt(Sxx);

        // B类：标尺读数不确定度传递至斜率
        const u_ins = INSTRUMENT_TOLERANCES.scale / Math.sqrt(3);
        const uB_slope = u_ins / Math.sqrt(Sxx);

        const u_Deltax = Math.sqrt(uA_slope**2 + uB_slope**2);

        return {
            Deltax: slope,
            uA_Deltax: uA_slope,
            uB_Deltax: uB_slope,
            u_Deltax,
            intercept,
            r,
            r2,
            sy,
            N,
            x,
            y,
            Sxx
        };
    }

    function drawChart(x, y, slope, intercept, r2) {
        const canvas = document.getElementById('fitChart');
        const container = document.getElementById('chartContainer');
        container.style.display = 'block';
        const rect = container.getBoundingClientRect();
        const maxWidth = rect.width - 20;
        const aspect = 1.5;
        const width = Math.min(maxWidth, 600);
        const height = width / aspect;
        canvas.width = width;
        canvas.height = height;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';

        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, width, height);

        const pad = { top: 30, right: 30, bottom: 50, left: 60 };
        const plotW = width - pad.left - pad.right;
        const plotH = height - pad.top - pad.bottom;

        // 数据范围
        const xMin = 0, xMax = x.length + 1;
        const yAll = y.slice();
        // 计算拟合线端点
        const fitY1 = slope * 1 + intercept;
        const fitY2 = slope * x.length + intercept;
        const yMin = Math.min(...yAll, fitY1, fitY2) - 1;
        const yMax = Math.max(...yAll, fitY1, fitY2) + 1;

        const scaleX = val => pad.left + (val - xMin) / (xMax - xMin) * plotW;
        const scaleY = val => height - pad.bottom - (val - yMin) / (yMax - yMin) * plotH;

        // 网格
        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        for (let i = 1; i <= x.length + 1; i++) {
            const sx = scaleX(i);
            ctx.moveTo(sx, pad.top);
            ctx.lineTo(sx, height - pad.bottom);
        }
        ctx.stroke();

        // 坐标轴
        ctx.strokeStyle = '#4a5568';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(pad.left, pad.top);
        ctx.lineTo(pad.left, height - pad.bottom);
        ctx.lineTo(width - pad.right, height - pad.bottom);
        ctx.stroke();

        // 轴标签
        ctx.fillStyle = '#4a5568';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        for (let i = 1; i <= x.length + 1; i++) {
            ctx.fillText(i, scaleX(i), height - pad.bottom + 18);
        }
        // 纵轴刻度（整数）
        const yStep = 1;
        const yStart = Math.ceil(yMin);
        const yEnd = Math.floor(yMax);
        for (let val = yStart; val <= yEnd; val += yStep) {
            const sy = scaleY(val);
            ctx.fillText(val, pad.left - 10, sy + 4);
        }
        ctx.save();
        ctx.translate(15, height/2);
        ctx.rotate(-Math.PI/2);
        ctx.fillText('标尺读数 (mm)', 0, 0);
        ctx.restore();
        ctx.fillText('砝码数', width/2, height - 8);

        // 散点
        ctx.fillStyle = '#667eea';
        for (let i = 0; i < x.length; i++) {
            const sx = scaleX(x[i]);
            const sy = scaleY(y[i]);
            ctx.beginPath();
            ctx.arc(sx, sy, 4, 0, 2*Math.PI);
            ctx.fill();
        }

        // 拟合线
        ctx.strokeStyle = '#e53e3e';
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 3]);
        ctx.beginPath();
        ctx.moveTo(scaleX(1), scaleY(fitY1));
        ctx.lineTo(scaleX(x.length), scaleY(fitY2));
        ctx.stroke();
        ctx.setLineDash([]);

        // 图例
        ctx.fillStyle = '#667eea';
        ctx.fillRect(pad.left + 10, pad.top + 10, 12, 12);
        ctx.fillStyle = '#4a5568';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('实验数据', pad.left + 28, pad.top + 22);

        ctx.strokeStyle = '#e53e3e';
        ctx.setLineDash([6, 3]);
        ctx.beginPath();
        ctx.moveTo(pad.left + 10, pad.top + 36);
        ctx.lineTo(pad.left + 24, pad.top + 36);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillText(`拟合线 (R²=${r2.toFixed(5)})`, pad.left + 28, pad.top + 42);
    }

    function compute() {
        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'block';
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.style.display = 'none';
        const chartContainer = document.getElementById('chartContainer');
        chartContainer.style.display = 'none';
        try {
            const g = parseFloat(document.getElementById('g').value);
            const m_g = parseFloat(document.getElementById('mass').value);
            const m = m_g / 1000;
            const mg = m * g;

            const L = parseFloat(document.getElementById('L').value);
            const D = parseFloat(document.getElementById('D').value);
            const d = parseFloat(document.getElementById('d').value);
            const b = parseFloat(document.getElementById('b').value);

            if (isNaN(L) || isNaN(D) || isNaN(d) || isNaN(b)) {
                throw new Error('请完整填写所有长度测量值！');
            }

            const raw = document.getElementById('xData').value.trim();
            const numbers = raw.split(/[\s,]+/).map(Number).filter(n => !isNaN(n));
            if (numbers.length < 2 || numbers.length % 2 !== 0) {
                throw new Error('标尺读数个数必须为偶数且至少2个！');
            }

            // 计算 Δx 相关量
            let Deltax, uA_Deltax, uB_Deltax, u_Deltax;
            let detailsHTML = '';

            if (currentMethod === 'chac') {
                const chacRes = computeChac(numbers);
                Deltax = chacRes.Deltax;
                uA_Deltax = chacRes.uA_Deltax;
                uB_Deltax = chacRes.uB_Deltax;
                u_Deltax = chacRes.u_Deltax;

                let deltaRows = chacRes.deltas.map((val, idx) =>
                    `<tr><td>δ${idx} = x${idx + chacRes.k} - x${idx}</td><td>${val.toFixed(4)} mm</td></tr>`
                ).join('');
                detailsHTML = `
                    <h4>📊 逐差法处理 (n=${chacRes.n}, k=${chacRes.k})</h4>
                    <table>
                        ${deltaRows}
                        <tr><td>δ 平均值</td><td>${chacRes.deltaAvg.toFixed(4)} mm</td></tr>
                        <tr><td>δ 实验标准差 s(δ)</td><td>${chacRes.deltaStd.toFixed(4)} mm</td></tr>
                        <tr><td>Δx = δ_avg / k</td><td>${Deltax.toFixed(6)} mm</td></tr>
                        <tr><td>A类 u<sub>A</sub>(Δx)</td><td>${formatExponential(uA_Deltax, 3)} mm</td></tr>
                        <tr><td>B类 u<sub>B</sub>(Δx)</td><td>${formatExponential(uB_Deltax, 3)} mm</td></tr>
                        <tr><td>合成 u(Δx)</td><td>${formatExponential(u_Deltax, 3)} mm</td></tr>
                    </table>
                `;
            } else { // 最小二乘法
                const lsRes = computeLS(numbers);
                Deltax = lsRes.Deltax;
                uA_Deltax = lsRes.uA_Deltax;
                uB_Deltax = lsRes.uB_Deltax;
                u_Deltax = lsRes.u_Deltax;

                detailsHTML = `
                    <h4>📈 最小二乘法处理 (n=${lsRes.N})</h4>
                    <table>
                        <tr><td>斜率 (Δx)</td><td>${Deltax.toFixed(6)} mm</td></tr>
                        <tr><td>截距</td><td>${lsRes.intercept.toFixed(4)} mm</td></tr>
                        <tr><td>相关系数 r</td><td>${lsRes.r.toFixed(5)}</td></tr>
                        <tr><td>决定系数 R²</td><td>${lsRes.r2.toFixed(5)}</td></tr>
                        <tr><td>残差标准差 s<sub>y</sub></td><td>${formatExponential(lsRes.sy, 3)} mm</td></tr>
                        <tr><td>A类 u<sub>A</sub>(Δx)</td><td>${formatExponential(uA_Deltax, 3)} mm</td></tr>
                        <tr><td>B类 u<sub>B</sub>(Δx)</td><td>${formatExponential(uB_Deltax, 3)} mm</td></tr>
                        <tr><td>合成 u(Δx)</td><td>${formatExponential(u_Deltax, 3)} mm</td></tr>
                    </table>
                `;

                // 绘制图表
                drawChart(lsRes.x, lsRes.y, Deltax, lsRes.intercept, lsRes.r2);
            }

            // 后续不确定度合成（长度量）
            const toM = (mm) => mm / 1000;
            const u_L = (INSTRUMENT_TOLERANCES.ruler / Math.sqrt(3)) / 1000;
            const u_D = (INSTRUMENT_TOLERANCES.ruler / Math.sqrt(3)) / 1000;
            const u_d = (INSTRUMENT_TOLERANCES.micrometer / Math.sqrt(3)) / 1000;
            const u_b = (INSTRUMENT_TOLERANCES.ruler / Math.sqrt(3)) / 1000;
            const u_Deltax_m = u_Deltax / 1000;

            const L_m = toM(L);
            const D_m = toM(D);
            const d_m = toM(d);
            const b_m = toM(b);
            const Deltax_m = toM(Deltax);

            const numerator = 8 * mg * L_m * D_m;
            const denominator = Math.PI * d_m * d_m * b_m * Deltax_m;
            const E = numerator / denominator;
            const E_GPa = E / 1e9;

            const rel_sq = (u_L/L_m)**2 + (u_D/D_m)**2 + (2*u_d/d_m)**2 + (u_b/b_m)**2 + (u_Deltax_m/Deltax_m)**2;
            const relE = Math.sqrt(rel_sq);
            const u_E = E * relE;
            const u_E_GPa = u_E / 1e9;

            document.getElementById('cards').innerHTML = `
                <div class="result-card">
                    <div class="value">${E_GPa.toPrecision(4)} GPa</div>
                    <div class="label">杨氏模量 E</div>
                </div>
                <div class="result-card">
                    <div class="value">± ${u_E_GPa.toPrecision(2)} GPa</div>
                    <div class="label">合成不确定度</div>
                </div>
                <div class="result-card">
                    <div class="value">${(relE*100).toFixed(2)}%</div>
                    <div class="label">相对不确定度</div>
                </div>
                <div class="result-card">
                    <div class="value">${Deltax.toFixed(4)} mm</div>
                    <div class="label">每增一砝码 Δx</div>
                </div>
            `;

            document.getElementById('detailsBlock').innerHTML = detailsHTML + `
                <table style="margin-top: 16px;">
                    <tr style="border-top:2px solid #cbd5e0;">
                        <td>长度量标准不确定度 (m)</td>
                        <td>u(L) = ${formatExponential(u_L, 2)}， u(D) = ${formatExponential(u_D, 2)}， u(d) = ${formatExponential(u_d, 2)}， u(b) = ${formatExponential(u_b, 2)}</td>
                    </tr>
                    <tr style="background: #e0e7ff;">
                        <td><strong>合成不确定度 u(E)</strong></td>
                        <td><strong>${formatExponential(u_E, 2)} Pa = ${formatExponential(u_E_GPa, 2)} GPa</strong></td>
                    </tr>
                </table>
            `;

        } catch (err) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = '❌ ' + err.message;
            document.getElementById('cards').innerHTML = '';
            document.getElementById('detailsBlock').innerHTML = '';
        }
    }
</script>
</body>
</html>
